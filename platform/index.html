<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arkived Platform</title>
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #171717;
        transition: opacity 0.5s ease;
      }
      #app-loader.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
      .app-loader__word {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 2rem;
        letter-spacing: -0.03em;
        color: #fafafa;
      }
      .app-loader__brand {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        animation: app-loader-pulse 1.3s ease-in-out infinite;
      }
      .app-loader__mark {
        height: 2.25rem;
        width: 2.25rem;
      }
      @keyframes app-loader-pulse {
        0%,
        100% {
          opacity: 0.45;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body class="bg-neutral-900 text-neutral-50">
    <div id="app-loader" aria-hidden="true">
      <div class="app-loader__brand">
        <svg class="app-loader__mark" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="26" height="26" rx="7" fill="#6366f1" />
          <path d="M11 22V13a3 3 0 0 1 3-3h4a3 3 0 0 1 3 3v9" stroke="white" stroke-width="2.4" stroke-linecap="round" />
          <path d="M11 17.5h10" stroke="white" stroke-width="2.4" stroke-linecap="round" />
        </svg>
        <span class="app-loader__word">arkived</span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
